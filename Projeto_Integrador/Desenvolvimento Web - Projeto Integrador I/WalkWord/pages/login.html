<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/login.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>WalkWord - Login</title>
  </head>

  <body>
    <div class="esquerda">
      <div class="overlay"></div>
      <div class="conteudo_esquerda">
        <button class="botao_esquerda">
          <i class="fa-solid fa-leaf" style="color: #4d5c41"></i> EST. 2026
        </button>
        <h1><span>Criado para as</span><br /><em>Mentes Conscientes.</em></h1>
      </div>
    </div>

    <div class="direita">
      <div class="conteudo_direita">
        <h1 class="titulo_direita">WalkWord</h1>
        <p class="subtitulo_direita">
          Bem-vindo(a)! Por favor, insira seus dados para entrar.
        </p>

        <form class="formulario_login" id="formulario_login">
          <label for="email" class="label_campo">EMAIL</label>
          <input
            type="email"
            id="email"
            class="input_campo"
            placeholder="hello@atelier.com"
          />

          <div class="senha_header">
            <label for="password" class="label_campo">SENHA</label>
            <a href="#" class="link_esqueceu">ESQUECEU A SENHA?</a>
          </div>
          <div class="input_senha_container">
            <input
              type="password"
              id="password"
              class="input_campo input_senha"
              placeholder="••••••••"
            />
            <i class="fa-regular fa-eye icone_senha"></i>
          </div>

          <div class="lembrar_container">
            <label class="checkbox_label">
              <input type="checkbox" id="lembrar" class="checkbox_campo" />
              Lembre-se de mim por 30 dias
            </label>
          </div>

          <button type="submit" class="botao_entrar">Entrar</button>
        </form>

        <p class="texto_cadastro">
          Novo por aqui?
          <a href="cadastro.html" class="link_cadastro">Crie sua conta</a>
        </p>
      </div>
    </div>
    <script src="../js/login.js"></script>
  </body>
</html>
