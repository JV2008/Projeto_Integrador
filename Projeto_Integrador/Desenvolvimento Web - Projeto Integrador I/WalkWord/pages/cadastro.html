<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/cadastro.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>WalkWord - Cadastro</title>
  </head>

  <body>
    <div class="esquerda">
      <div class="conteudo_formulario">
        <h1 class="titulo_formulario">WalkWord</h1>
        <p class="subtitulo_formulario">Crie sua conta</p>

        <form class="formulario_cadastro" id="formulario_cadastro">
          <label for="nome" class="label_campo">NOME</label>
          <input
            type="text"
            id="nome"
            class="input_campo"
            placeholder="Seu nome completo"
          />

          <label for="email" class="label_campo">EMAIL</label>
          <input
            type="email"
            id="email"
            class="input_campo"
            placeholder="hello@atelier.com"
          />

          <div class="linha_dupla">
            <div class="campo_metade">
              <label for="cpf" class="label_campo">CPF</label>
              <input
                type="text"
                id="cpf"
                class="input_campo"
                placeholder="000.000.000-00"
              />
            </div>
            <div class="campo_metade">
              <label for="telefone" class="label_campo">TELEFONE</label>
              <input
                type="text"
                id="telefone"
                class="input_campo"
                placeholder="(00) 00000-0000"
              />
            </div>
          </div>

          <label for="cidade" class="label_campo">CIDADE</label>
          <input
            type="text"
            id="cidade"
            class="input_campo"
            placeholder="Sua cidade"
          />

          <label for="endereco" class="label_campo">ENDEREÇO</label>
          <input
            type="text"
            id="endereco"
            class="input_campo"
            placeholder="Rua, Avenida, etc."
          />

          <label for="complemento" class="label_campo">COMPLEMENTO</label>
          <input
            type="text"
            id="complemento"
            class="input_campo"
            placeholder="Apto, Bloco, etc."
          />

          <label for="bairro" class="label_campo">BAIRRO</label>
          <input
            type="text"
            id="bairro"
            class="input_campo"
            placeholder="Seu bairro"
          />

          <div class="linha_dupla">
            <div class="campo_metade">
              <label for="numero" class="label_campo">NÚMERO</label>
              <input
                type="text"
                id="numero"
                class="input_campo"
                placeholder="123"
              />
            </div>
            <div class="campo_metade">
              <label for="cep" class="label_campo">CEP</label>
              <input
                type="text"
                id="cep"
                class="input_campo"
                placeholder="00000-000"
              />
            </div>
          </div>

          <label for="senha" class="label_campo">SENHA</label>
          <input
            type="password"
            id="senha"
            class="input_campo"
            placeholder="••••••••"
          />

          <label for="confirmar_senha" class="label_campo"
            >CONFIRMAR SENHA</label
          >
          <input
            type="password"
            id="confirmar_senha"
            class="input_campo"
            placeholder="••••••••"
          />

          <button type="submit" class="botao_cadastrar">Cadastrar</button>
        </form>

        <p class="texto_login">
          Já tem uma conta?
          <a href="login.html" class="link_login">Faça login</a>
        </p>
      </div>
    </div>

    <div class="direita">
      <div class="overlay"></div>
      <div class="conteudo_imagem">
        <button class="botao_imagem">
          <i class="fa-solid fa-leaf" style="color: #4d5c41"></i> EST. 2026
        </button>
        <h1><span>Criado para as</span><br /><em>Mentes Conscientes.</em></h1>
      </div>
    </div>

    <script src="../js/cadastro.js"></script>
  </body>
</html>
